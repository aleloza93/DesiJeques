<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicaciones - DesiJeques</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>DesiJeques</h2>
            <span>Gestión Inmobiliaria</span>
        </div>
        <nav class="sidebar-menu">
            <a th:href="@{/}" class="menu-item">🏠 Inicio</a>
            <a th:href="@{/propiedades}" class="menu-item">🏢 Propiedades</a>
            <a th:href="@{/publicaciones}" class="menu-item active">📢 Publicaciones</a>
            <a th:href="@{/contratos}" class="menu-item">📜 Contratos</a>
            <a th:href="@{/facturas}" class="menu-item">💵 Facturas</a>
        </nav>
    </aside>

    <main class="main-content">

        <div class="module-header">
            <div class="module-title">
                <h1>Publicaciones</h1>
                <p>Consulta y administración de propiedades ofrecidas en alquiler.</p>
            </div>
            <div class="toolbar">
                <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
                <a th:href="@{/publicaciones/nueva}" class="btn btn-primary">Nueva Publicación</a>
            </div>
        </div>

        <div th:if="${ok}" class="mensaje-exito">
            <span th:text="${ok}"></span>
        </div>
        <div th:if="${error}" class="mensaje-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Filtros -->
        <div class="form-container" style="max-width: 100%; margin: 0 0 24px 0; padding: 20px;">
            <form th:action="@{/publicaciones}" method="get"
                  style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">

                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 140px;">
                    <label style="font-size: 0.85em; margin-bottom: 4px;">Propiedad</label>
                    <select name="propiedadId" style="padding: 8px;">
                        <option value="">Todas</option>
                        <option th:each="propiedad : ${propiedades}"
                                th:value="${propiedad.id}"
                                th:text="${propiedad.direccion + ' (' + propiedad.ciudad + ')'}"
                                th:selected="${propiedad.id == propiedadId}">
                        </option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 120px;">
                    <label style="font-size: 0.85em; margin-bottom: 4px;">Ciudad</label>
                    <input type="text" name="ciudad" th:value="${ciudad}" style="padding: 8px;" placeholder="Ej: Buenos Aires" />
                </div>

                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 130px;">
                    <label style="font-size: 0.85em; margin-bottom: 4px;">Estado</label>
                    <select name="estado" style="padding: 8px;">
                        <option value="">Todos</option>
                        <option value="activa"     th:selected="${estado == 'activa'}">Activa</option>
                        <option value="pausada"    th:selected="${estado == 'pausada'}">Pausada</option>
                        <option value="finalizada" th:selected="${estado == 'finalizada'}">Finalizada</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 110px;">
                    <label style="font-size: 0.85em; margin-bottom: 4px;">Precio mín. $</label>
                    <input type="number" name="precioMin" th:value="${precioMin}"
                           style="padding: 8px;" min="0" placeholder="0" />
                </div>

                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 110px;">
                    <label style="font-size: 0.85em; margin-bottom: 4px;">Precio máx. $</label>
                    <input type="number" name="precioMax" th:value="${precioMax}"
                           style="padding: 8px;" min="0" placeholder="Sin límite" />
                </div>

                <div style="margin-bottom: 0; display: flex; gap: 8px; align-items: center;">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                    <a th:href="@{/publicaciones}" class="btn btn-secondary">Limpiar</a>
                </div>
            </form>
        </div>

        <!-- Tabla -->
        <div class="card table-wrapper">
            <table class="tabla-listado">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Propiedad</th>
                    <th>Ciudad</th>
                    <th>Precio mensual</th>
                    <th>Fecha publicación</th>
                    <th>Estado</th>
                    <th class="text-center" colspan="2">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pub : ${publicaciones}">
                    <td th:text="${pub.id}" class="fw-bold"></td>
                    <td th:text="${pub.propiedad.direccion}"></td>
                    <td th:text="${pub.propiedad.ciudad}"></td>
                    <td th:text="${'$' + pub.precioMensual}" class="fw-bold"></td>
                    <td th:text="${pub.fechaPublicacion != null ? #temporals.format(pub.fechaPublicacion, 'dd/MM/yyyy') : '-'}"></td>
                    <td>
                        <span th:text="${pub.estado}"
                              th:class="${pub.estado == 'activa'     ? 'badge badge-activo'   :
                                         pub.estado == 'pausada'    ? 'badge badge-pendiente-info' :
                                                                       'badge badge-inactivo'}">
                        </span>
                    </td>
                    <td class="text-center" style="width: 90px;">
                        <a th:href="@{/publicaciones/editar/{id}(id=${pub.id})}"
                           class="btn btn-warning btn-sm">Editar</a>
                    </td>
                    <td class="text-center" style="width: 90px;">
                        <!-- Solo se pueden eliminar publicaciones activas -->
                        <a th:if="${pub.estado == 'activa'}"
                           th:href="@{/publicaciones/eliminar/{id}(id=${pub.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Seguro que desea eliminar esta publicación? La acción no podrá revertirse.')">
                            Eliminar
                        </a>
                        <button th:unless="${pub.estado == 'activa'}"
                                type="button"
                                class="btn-disabled-action btn-sm"
                                th:title="${'No se puede eliminar una publicación ' + pub.estado}"
                                disabled>
                            Eliminar
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

</body>
</html>
