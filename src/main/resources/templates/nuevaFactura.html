<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Factura</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div class="form-container">
        <h1>Nueva Factura</h1>
        
        <form th:action="@{/facturas/nuevaFactura}" method="post">
            
            <div class="form-section">
                <h3>Datos del Contrato</h3>
                <div class="form-group">
                    <label for="contratoId">ID Contrato:</label>
                    <input type="text" id="contratoId" name="contrato.id" th:value="${contrato.id}" readonly />
                </div>

                <div class="form-group">
                    <label for="importe">Importe Base Mensual:</label>
                    <div class="input-with-prefix">
                        <span>$</span>
                        <input type="number" step="0.01" id="importe" name="importe" th:value="${contrato.importeMensual}" readonly />
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Detalle de la Factura</h3>
                <div class="form-group">
                    <label for="conceptoFacturado">Concepto facturado:</label>
                    <input type="text" id="conceptoFacturado" name="conceptoFacturado" placeholder="Ej: Alquiler Mes Julio" required />
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="fechaEmision">Fecha de emisión:</label>
                        <input type="date" id="fechaEmision" name="fechaEmision" required />
                    </div>

                    <div class="form-group">
                        <label for="fechaVencimiento">Fecha de vencimiento:</label>
                        <input type="date" id="fechaVencimiento" name="fechaVencimiento" required />
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Información de Pago</h3>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fechaPago">Fecha de pago:</label>
                        <input type="date" id="fechaPago" name="fechaPago" />
                    </div>

                    <div class="form-group">
                        <label for="medioPago">Medio de pago:</label>
                        <select id="medioPago" name="medio">
                            <option value="">-- Seleccione --</option>
                            <option value="TRANSFERENCIA">Transferencia</option>
                            <option value="EFECTIVO">Efectivo</option>
                            <option value="DEBITO">Débito</option>
                            <option value="CREDITO">Crédito</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="importePagado">Importe pagado:</label>
                        <div class="input-with-prefix">   
							<span>$</span>                         
                            <input type="number" step="0.01" id="importePagado" name="importePagado" placeholder="0.00" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="interesPagado">Interés pagado:</label>
                        <div class="input-with-prefix">
							<span>$</span>
                            <input type="number" step="0.01" id="interesPagado" name="interes" placeholder="0.00" />
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-submit">Guardar Factura</button>
                <a th:href="@{/facturas/contratosParaFacturar}" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
    
</body>
</html>
