<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contratos para Facturar</title>
</head>
<body>

    <h1>Contratos disponibles para facturar</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="contrato : ${contratos}">
                <td th:text="${contrato.id}"></td>
                <td th:text="${contrato.estado}"></td>
                <td>
                    <a th:href="@{/facturas/nuevaFactura(contratoId=${contrato.id})}">
                        Facturar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
