<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Facturas - DesiJeques</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div class="table-container">
        <h1>Eliminar Facturas</h1>
        <p>A continuación se listan las facturas del sistema. Al confirmar la acción se realizará una baja lógica del registro.</p>

        <table class="tabla-listado">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Concepto</th>
                    <th>Emisión</th>
                    <th>Vencimiento</th>
                    <th>Estado</th>
                    <th>Importe</th>
                    <th class="text-center">Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(facturas)}">
                    <td colspan="7" class="text-center sin-datos">
                        No hay facturas disponibles para eliminar en este momento.
                    </td>
                </tr>
                
                <tr th:each="factura : ${facturas}">
                    <td th:text="${factura.id}" class="fw-bold"></td>
                    <td th:text="${factura.conceptoFacturado}"></td>
                    <td th:text="${factura.fechaEmision}"></td>
                    <td th:text="${factura.fechaVencimiento}"></td>
                    <td>
                        <span th:text="${factura.estado}" 
                              th:class="${factura.estado == 'PAGADA' ? 'badge badge-activo' : (factura.estado == 'ANULADA' ? 'badge badge-inactivo' : 'badge badge-pendiente-info')}">
                        </span>
                    </td>
                    <td th:text="${'$' + factura.importe}"></td>
                    <td class="text-center">
                        <form th:action="@{/facturas/eliminarFactura}" method="post" style="margin:0;">
                            <input type="hidden" name="id" th:value="${factura.id}" />
                            <button type="submit" 
                                    class="btn-danger"
                                    onclick="return confirm('¿Está seguro que desea eliminar esta factura? Esta acción no se puede deshacer.')">
                                Eliminar
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="table-actions">
            <a th:href="@{/}" class="btn-back">Volver al Inicio</a>
        </div>
    </div>

</body>
</html>
