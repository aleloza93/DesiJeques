<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Propiedad' : 'Nueva Propiedad'"></title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        form { max-width: 700px; }
        label { display: block; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; }
        .acciones { margin-top: 20px; }
        .btn { padding: 8px 12px; text-decoration: none; border: 1px solid #333; margin-right: 5px; }
        .error { color: red; }
    </style>
</head>
<body>

<h1 th:text="${modoEdicion} ? 'Editar Propiedad' : 'Nueva Propiedad'"></h1>

<p class="error" th:if="${error}" th:text="${error}"></p>

<form th:action="@{/propiedades/guardar}" th:object="${propiedad}" method="post">
    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:field="*{eliminada}">

    <label>Dirección</label>
    <input type="text" th:field="*{direccion}">

    <label>Ciudad</label>
    <input type="text" th:field="*{ciudad}">

    <label>Tipo de propiedad</label>
    <select th:field="*{tipoPropiedad}">
        <option value="">Seleccione...</option>
        <option value="casa">Casa</option>
        <option value="departamento">Departamento</option>
        <option value="local">Local</option>
        <option value="otro">Otro</option>
    </select>

    <label>Cantidad de ambientes</label>
    <input type="number" th:field="*{cantidadAmbientes}" min="1">

    <label>Metros cuadrados</label>
    <input type="number" step="0.01" th:field="*{metrosCuadrados}" min="0.01">

    <label>Descripción</label>
    <textarea th:field="*{descripcion}" rows="4"></textarea>

    <label>Estado de disponibilidad</label>
    <select th:field="*{estadoDisponibilidad}">
        <option value="disponible">Disponible</option>
        <option value="reservada">Reservada</option>
        <option value="alquilada">Alquilada</option>
        <option value="inactiva">Inactiva</option>
    </select>

    <label>Propietario</label>
    <select th:field="*{propietario.id}">
        <option value="">Seleccione...</option>
        <option th:each="persona : ${personas}"
                th:value="${persona.id}"
                th:text="${persona.nombreCompleto + ' - ' + persona.documento}">
        </option>
    </select>

    <div class="acciones">
        <button type="submit" class="btn">Guardar</button>
        <a th:href="@{/propiedades}" class="btn">Volver</a>
    </div>
</form>

</body>
</html>
