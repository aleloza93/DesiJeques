<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Propiedades</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="page-shell">
    <div class="module-header">
        <div class="module-title">
            <h1>Propiedades</h1>
            <p>Administración de inmuebles registrados en el sistema.</p>
        </div>
        <div class="toolbar">
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
            <a th:href="@{/propiedades/nueva}" class="btn btn-primary">Nueva Propiedad</a>
        </div>
    </div>

    <p class="ok" th:if="${ok}" th:text="${ok}"></p>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <div class="card">
        <form th:action="@{/propiedades}" method="get">
            <div class="filter-grid">
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" name="direccion" th:value="${direccion}">
                </div>

                <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" name="ciudad" th:value="${ciudad}">
                </div>

                <div class="form-group">
                    <label>Tipo de propiedad</label>
                    <select name="tipoPropiedad">
                        <option value="">Todos</option>
                        <option value="casa" th:selected="${tipoPropiedad == 'casa'}">Casa</option>
                        <option value="departamento" th:selected="${tipoPropiedad == 'departamento'}">Departamento</option>
                        <option value="local" th:selected="${tipoPropiedad == 'local'}">Local</option>
                        <option value="otro" th:selected="${tipoPropiedad == 'otro'}">Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Estado de disponibilidad</label>
                    <select name="estadoDisponibilidad">
                        <option value="">Todos</option>
                        <option value="disponible" th:selected="${estadoDisponibilidad == 'disponible'}">Disponible</option>
                        <option value="reservada" th:selected="${estadoDisponibilidad == 'reservada'}">Reservada</option>
                        <option value="alquilada" th:selected="${estadoDisponibilidad == 'alquilada'}">Alquilada</option>
                        <option value="inactiva" th:selected="${estadoDisponibilidad == 'inactiva'}">Inactiva</option>
                    </select>
                </div>
            </div>

            <div class="actions-row">
                <button type="submit" class="btn btn-primary">Buscar</button>
                <a th:href="@{/propiedades}" class="btn btn-secondary">Limpiar</a>
            </div>
        </form>
    </div>

    <div class="card table-wrapper">
        <table class="tabla-listado">
            <thead>
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Ciudad</th>
                <th>Tipo</th>
                <th>Ambientes</th>
                <th>m²</th>
                <th>Estado</th>
                <th>Propietario</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="propiedad : ${propiedades}">
                <td th:text="${propiedad.id}"></td>
                <td th:text="${propiedad.direccion}"></td>
                <td th:text="${propiedad.ciudad}"></td>
                <td th:text="${propiedad.tipoPropiedad}"></td>
                <td th:text="${propiedad.cantidadAmbientes}"></td>
                <td th:text="${propiedad.metrosCuadrados}"></td>
                <td>
                    <span class="badge"
                          th:text="${propiedad.estadoDisponibilidad}"
                          th:classappend="${' badge-' + propiedad.estadoDisponibilidad}">
                    </span>
                </td>
                <td th:text="${propiedad.propietario.nombreCompleto}"></td>
                <td>
                    <div class="table-actions">
                        <a th:href="@{/propiedades/editar/{id}(id=${propiedad.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/propiedades/eliminar/{id}(id=${propiedad.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Seguro que desea eliminar la propiedad?')">Eliminar</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
